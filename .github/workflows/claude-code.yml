name: Claude Code Agent

on:
  issue_comment:
    types: [created]
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  claude:
    name: Run Claude Code
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'issues' && github.event.action == 'opened')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Run Claude Code
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_OAUTH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUMBER="${{ github.event.issue.number }}"
          ISSUE_TITLE="${{ github.event.issue.title }}"
          ISSUE_BODY="${{ github.event.issue.body }}"

          COMMENT_BODY=""
          if [ "${{ github.event_name }}" = "issue_comment" ]; then
            COMMENT_BODY="${{ github.event.comment.body }}"
          fi

          PROMPT="You are working on a Spring Boot Java 21 project.

          GitHub Issue #${ISSUE_NUMBER}: ${ISSUE_TITLE}

          Issue description:
          ${ISSUE_BODY}

          ${COMMENT_BODY:+Additional instruction: $COMMENT_BODY}

          Please implement the required changes:
          1. Write the code as described in the issue
          2. Add unit tests
          3. Make sure mvn test passes
          4. Create a new git branch named feature/issue-${ISSUE_NUMBER}
          5. Commit and push the branch
          6. Open a pull request that references issue #${ISSUE_NUMBER}"

          claude --dangerously-skip-permissions -p "$PROMPT"
