name: Claude Code Agent

on:
  issue_comment:
    types: [created]
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  claude:
    name: Run Claude Code
    if: |
      github.event_name == 'issue_comment' ||
      (github.event_name == 'issues' && github.event.action == 'opened')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Configure git
        run: |
          git config --global user.name "Claude Code Bot"
          git config --global user.email "claude-bot@users.noreply.github.com"

      - name: Run Claude Code
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_OAUTH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          cat > /tmp/prompt.txt << 'PROMPT_EOF'
          You are working on a Spring Boot Java 21 project.
          PROMPT_EOF

          echo "GitHub Issue #${ISSUE_NUMBER}: ${ISSUE_TITLE}" >> /tmp/prompt.txt
          echo "" >> /tmp/prompt.txt
          echo "Issue description:" >> /tmp/prompt.txt
          echo "${ISSUE_BODY}" >> /tmp/prompt.txt

          if [ "$EVENT_NAME" = "issue_comment" ] && [ -n "$COMMENT_BODY" ]; then
            echo "" >> /tmp/prompt.txt
            echo "Additional instruction: ${COMMENT_BODY}" >> /tmp/prompt.txt
          fi

          cat >> /tmp/prompt.txt << 'PROMPT_EOF'

          Please implement the required changes by running these exact steps:
          1. Write all the code as described in the issue
          2. Add unit tests
          3. Run: mvn test  (make sure it passes)
          4. Run: git checkout -b feature/issue-ISSUE_NUM
          5. Run: git add -A && git commit -m "feat: implement issue #ISSUE_NUM"
          6. Run: git push origin feature/issue-ISSUE_NUM
          7. Run: gh pr create --title "Implement issue #ISSUE_NUM" --body "Closes #ISSUE_NUM" --base main --head feature/issue-ISSUE_NUM

          Step 7 is mandatory — the PR must be created automatically using the gh CLI.
          PROMPT_EOF

          sed -i "s/ISSUE_NUM/${ISSUE_NUMBER}/g" /tmp/prompt.txt

          claude --dangerously-skip-permissions -p "$(cat /tmp/prompt.txt)"
